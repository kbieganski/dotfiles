- name: Install Emacs
  pacman: name=emacs
  become: true
- name: Clone doom-emacs
  git:
    repo: https://github.com/hlissner/doom-emacs ~/.emacs.d
    dest:  ~/.emacs.d
- name: Create symlink for Emacs config
  file:
    src: {{DOTFILES_DIR}}/doom
    dest: ~/.doom.d
    state: link
- name: Copy file with owner and permissions
  copy:
    src: /srv/myfiles/foo.conf
    dest: /etc/foo.conf
    owner: foo
    group: foo
    mode: '0644'
