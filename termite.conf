[options]
allow_bold = true
audible_bell = false
clickable_url = true
dynamic_title = true
font = Iosevka 10
fullscreen = false
icon_name = terminal
mouse_autohide = false
scroll_on_output = false
scroll_on_keystroke = true
scrollback_lines = 10000
search_wrap = true
urgent_on_bell = true
hyperlinks = true

# $BROWSER is used by default if set, with xdg-open as a fallback
browser = xdg-open

# "system", "on" or "off"
cursor_blink = system

# "block", "underline" or "ibeam"
cursor_shape = block

# Hide links that are no longer valid in url select overlay mode
filter_unmatched_urls = true

# Emit escape sequences for extra modified keys
#modify_other_keys = false

# set size hints for the window
#size_hints = false

# "off", "left" or "right"
scrollbar = right

[colors]
background = rgba(231, 232, 235, 0.9)

foreground= #4E5157
foreground_bold= #4E5157
foreground_dim= #4E5157

highlight = #A0A0A0

color0=#fafafa
color8=#fafafa
color1=#99324b
color9=#99324b
color2=##4f894c
color10=#4f894c
color3=#9a7500
color11=#9a7500
color4=#5294e2
color12=#5294e2
color5=#97365b
color13=#97365b
color6=#398eac
color14=#398eac
color7= #333333
color15= #333333
